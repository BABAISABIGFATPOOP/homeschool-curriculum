<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Homeschool Curriculum</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
    }

    /* ── Sign In Screen ── */
    #signin-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 30px;
    }

    #signin-screen h1 {
      font-size: 2.8rem;
      font-weight: 700;
      color: #f8fafc;
      text-align: center;
    }

    #signin-screen p {
      font-size: 1.1rem;
      color: #94a3b8;
      margin-top: -16px;
    }

    .signin-form {
      display: flex;
      flex-direction: column;
      gap: 20px;
      width: 360px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-group label {
      font-size: 0.85rem;
      font-weight: 600;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-group input {
      padding: 12px 16px;
      border: 2px solid #334155;
      border-radius: 10px;
      background: #1e293b;
      color: #f8fafc;
      font-size: 1rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }

    .form-group input:focus {
      border-color: #3b82f6;
    }

    .form-group input::placeholder {
      color: #475569;
    }

    .signin-btn {
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: #3b82f6;
      color: white;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 4px;
    }

    .signin-btn:hover {
      background: #2563eb;
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(59, 130, 246, 0.3);
    }

    .signin-btn:disabled {
      background: #334155;
      color: #64748b;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .signin-error {
      color: #f87171;
      font-size: 0.85rem;
      text-align: center;
      min-height: 20px;
    }

    /* ── Role Selection Screen ── */
    #role-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 40px;
    }

    #role-screen h1 {
      font-size: 2.8rem;
      font-weight: 700;
      color: #f8fafc;
      text-align: center;
    }

    #role-screen p {
      font-size: 1.1rem;
      color: #94a3b8;
      margin-top: -20px;
    }

    .role-buttons {
      display: flex;
      gap: 30px;
    }

    .role-btn {
      width: 260px;
      height: 200px;
      border: 2px solid #334155;
      border-radius: 16px;
      background: #1e293b;
      color: #f8fafc;
      font-size: 1.3rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    .role-btn:hover {
      border-color: #3b82f6;
      background: #1e3a5f;
      transform: translateY(-4px);
      box-shadow: 0 8px 30px rgba(59, 130, 246, 0.2);
    }

    .role-btn .icon {
      font-size: 3rem;
    }

    .role-btn .subtitle {
      font-size: 0.85rem;
      color: #94a3b8;
      font-weight: 400;
    }

    /* ── App Layout ── */
    #app-screen {
      display: none;
      height: 100vh;
    }

    /* ── Top Bar ── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 24px;
      background: #1e293b;
      border-bottom: 1px solid #334155;
    }

    .topbar h2 {
      font-size: 1.1rem;
      font-weight: 600;
      color: #f8fafc;
    }

    .topbar .role-badge {
      background: #3b82f6;
      color: white;
      padding: 4px 14px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .topbar .role-badge.student {
      background: #10b981;
    }

    .back-btn {
      background: none;
      border: 1px solid #475569;
      color: #94a3b8;
      padding: 6px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.15s;
    }

    .back-btn:hover {
      border-color: #64748b;
      color: #e2e8f0;
      background: #334155;
    }

    /* ── Main Content Area ── */
    .main-area {
      display: flex;
      height: calc(100vh - 53px);
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 260px;
      min-width: 260px;
      background: #1e293b;
      border-right: 1px solid #334155;
      overflow-y: auto;
      padding: 16px 0;
    }

    .sidebar-section {
      margin-bottom: 8px;
    }

    .sidebar-section-title {
      padding: 8px 20px;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #64748b;
      font-weight: 700;
    }

    .sidebar-item {
      display: block;
      width: 100%;
      text-align: left;
      padding: 10px 20px;
      border: none;
      background: none;
      color: #cbd5e1;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.1s;
    }

    .sidebar-item:hover {
      background: #334155;
      color: #f8fafc;
    }

    .sidebar-item.active {
      background: #3b82f6;
      color: white;
      font-weight: 600;
    }

    /* ── Content ── */
    .content {
      flex: 1;
      overflow-y: auto;
      padding: 32px 48px;
    }

    .content h1 { font-size: 2rem; color: #f8fafc; margin-bottom: 24px; border-bottom: 2px solid #334155; padding-bottom: 12px; }
    .content h2 { font-size: 1.4rem; color: #93c5fd; margin-top: 32px; margin-bottom: 12px; }
    .content h3 { font-size: 1.15rem; color: #60a5fa; margin-top: 24px; margin-bottom: 8px; }
    .content p { line-height: 1.7; margin-bottom: 12px; color: #cbd5e1; }
    .content ul, .content ol { margin-left: 24px; margin-bottom: 16px; }
    .content li { line-height: 1.7; margin-bottom: 4px; color: #cbd5e1; }
    .content strong { color: #f8fafc; }

    .content table {
      width: 100%;
      border-collapse: collapse;
      margin: 16px 0 24px;
      font-size: 0.9rem;
    }

    .content th {
      background: #334155;
      color: #f8fafc;
      padding: 10px 14px;
      text-align: left;
      font-weight: 600;
      border: 1px solid #475569;
    }

    .content td {
      padding: 10px 14px;
      border: 1px solid #334155;
      color: #cbd5e1;
    }

    .content tr:hover td {
      background: #1e293b;
    }

    /* ── Language Selection ── */
    #language-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 30px;
      padding: 40px;
    }

    #language-screen h1 {
      font-size: 2.2rem;
      color: #f8fafc;
      text-align: center;
    }

    #language-screen p {
      color: #94a3b8;
      margin-top: -16px;
      text-align: center;
    }

    .lang-options {
      display: flex;
      gap: 20px;
    }

    .lang-card {
      width: 200px;
      height: 160px;
      border: 2px solid #334155;
      border-radius: 14px;
      background: #1e293b;
      color: #f8fafc;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .lang-card:hover {
      border-color: #3b82f6;
      background: #1e3a5f;
      transform: translateY(-3px);
    }

    .lang-card.selected {
      border-color: #3b82f6;
      background: #1e3a5f;
      box-shadow: 0 0 20px rgba(59, 130, 246, 0.2);
    }

    .lang-card .lang-icon {
      font-size: 2.5rem;
    }

    .lang-card .lang-sub {
      font-size: 0.8rem;
      color: #94a3b8;
      font-weight: 400;
    }

    /* ── Student Grade Picker ── */
    #grade-picker {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 30px;
    }

    #grade-picker h1 {
      font-size: 2.2rem;
      color: #f8fafc;
    }

    #grade-picker p {
      color: #94a3b8;
      margin-top: -16px;
    }

    .grade-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      max-width: 600px;
    }

    .grade-btn {
      width: 120px;
      height: 90px;
      border: 2px solid #334155;
      border-radius: 12px;
      background: #1e293b;
      color: #f8fafc;
      font-size: 1.2rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .grade-btn:hover {
      border-color: #10b981;
      background: #1e3b33;
      transform: translateY(-3px);
      box-shadow: 0 6px 20px rgba(16, 185, 129, 0.15);
    }

    .grade-btn .label {
      font-size: 0.75rem;
      color: #94a3b8;
      font-weight: 400;
    }

    /* ── Home cards (parent dashboard) ── */
    .home-cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
      margin-top: 24px;
    }

    .home-card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 24px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .home-card:hover {
      border-color: #3b82f6;
      transform: translateY(-2px);
      box-shadow: 0 4px 20px rgba(59, 130, 246, 0.1);
    }

    .home-card h3 {
      color: #f8fafc;
      margin-bottom: 8px;
      font-size: 1.1rem;
    }

    .home-card p {
      color: #94a3b8;
      font-size: 0.9rem;
      line-height: 1.5;
    }

    /* ── Placement Test ── */
    #test-screen {
      display: none;
      flex-direction: column;
      min-height: 100vh;
    }

    .test-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 24px;
      background: #1e293b;
      border-bottom: 1px solid #334155;
    }

    .test-topbar h2 { font-size: 1.1rem; color: #f8fafc; }

    .test-progress {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .test-progress-bar {
      width: 200px;
      height: 8px;
      background: #334155;
      border-radius: 4px;
      overflow: hidden;
    }

    .test-progress-fill {
      height: 100%;
      background: #3b82f6;
      border-radius: 4px;
      transition: width 0.3s ease;
    }

    .test-progress-text {
      font-size: 0.85rem;
      color: #94a3b8;
      min-width: 60px;
    }

    .test-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px;
      gap: 30px;
    }

    .test-subject-badge {
      padding: 4px 14px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .test-subject-badge.math { background: #3b82f6; color: white; }
    .test-subject-badge.english { background: #8b5cf6; color: white; }
    .test-subject-badge.biology { background: #10b981; color: white; }

    .test-question {
      font-size: 1.3rem;
      color: #f8fafc;
      text-align: center;
      max-width: 700px;
      line-height: 1.6;
    }

    .test-options {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
      max-width: 500px;
    }

    .test-option {
      padding: 14px 20px;
      border: 2px solid #334155;
      border-radius: 10px;
      background: #1e293b;
      color: #e2e8f0;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.15s;
      text-align: left;
    }

    .test-option:hover {
      border-color: #3b82f6;
      background: #1e3a5f;
    }

    .test-option.selected {
      border-color: #3b82f6;
      background: #1e3a5f;
    }

    .test-option.correct {
      border-color: #10b981;
      background: #064e3b;
    }

    .test-option.wrong {
      border-color: #ef4444;
      background: #450a0a;
    }

    .test-next-btn {
      padding: 12px 40px;
      border: none;
      border-radius: 10px;
      background: #3b82f6;
      color: white;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .test-next-btn:hover {
      background: #2563eb;
    }

    .test-next-btn:disabled {
      background: #334155;
      color: #64748b;
      cursor: not-allowed;
    }

    /* ── Test Rules Screen ── */
    .test-rules {
      max-width: 600px;
      text-align: center;
    }

    .test-rules h1 {
      font-size: 2rem;
      color: #f8fafc;
      margin-bottom: 24px;
    }

    .test-rules ul {
      text-align: left;
      margin: 20px 0 30px 20px;
      list-style: none;
    }

    .test-rules ul li {
      padding: 8px 0;
      color: #cbd5e1;
      font-size: 1rem;
      line-height: 1.6;
    }

    .test-rules ul li::before {
      content: '\2022';
      color: #3b82f6;
      font-weight: bold;
      display: inline-block;
      width: 1.2em;
    }

    /* ── Results Screen ── */
    #results-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 30px;
      padding: 40px;
    }

    .results-card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 32px;
      max-width: 550px;
      width: 100%;
    }

    .results-card h1 {
      font-size: 1.8rem;
      color: #f8fafc;
      margin-bottom: 24px;
      text-align: center;
    }

    .result-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 0;
      border-bottom: 1px solid #334155;
    }

    .result-row:last-child { border-bottom: none; }

    .result-subject {
      font-size: 1rem;
      color: #cbd5e1;
      font-weight: 600;
    }

    .result-grade {
      font-size: 1.1rem;
      font-weight: 700;
      padding: 4px 16px;
      border-radius: 20px;
    }

    .result-grade.math { background: #1e3a5f; color: #60a5fa; }
    .result-grade.english { background: #2e1065; color: #a78bfa; }
    .result-grade.biology { background: #064e3b; color: #34d399; }

    .result-overall {
      text-align: center;
      margin-top: 20px;
      padding-top: 20px;
      border-top: 2px solid #334155;
    }

    .result-overall-grade {
      font-size: 2.5rem;
      font-weight: 800;
      color: #f8fafc;
    }

    .result-overall-label {
      font-size: 0.9rem;
      color: #94a3b8;
      margin-top: 4px;
    }

    .result-score {
      font-size: 0.85rem;
      color: #64748b;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #0f172a; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #475569; }
  </style>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>

  <!-- ── AUTH SCREEN ── -->
  <div id="signin-screen">
    <h1>Homeschool Curriculum</h1>
    <p id="auth-subtitle">Sign in to get started</p>
    <div class="signin-form">
      <div class="form-group" id="name-group" style="display:none;">
        <label>Name</label>
        <input type="text" id="signin-name" placeholder="Enter your name" autocomplete="off">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="signin-email" placeholder="Enter your email" autocomplete="off">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="signin-password" placeholder="Enter your password">
      </div>
      <div class="form-group" id="dob-group" style="display:none;">
        <label>Date of Birth</label>
        <input type="date" id="signin-dob">
      </div>
      <div class="signin-error" id="signin-error"></div>
      <button class="signin-btn" id="signin-btn" onclick="handleAuth()">Sign In</button>
      <p style="text-align:center;color:#94a3b8;font-size:0.9rem;">
        <span id="auth-toggle-text">Don't have an account?</span>
        <a href="#" id="auth-toggle-link" onclick="toggleAuthMode(event)" style="color:#3b82f6;text-decoration:none;font-weight:600;">Sign Up</a>
      </p>
    </div>
  </div>

  <!-- ── ROLE SELECTION ── -->
  <div id="role-screen">
    <h1 id="role-screen-title">Homeschool Curriculum</h1>
    <p>Grades 4 – 10 &nbsp;|&nbsp; Math, English, Biology</p>
    <div class="role-buttons">
      <button class="role-btn" onclick="selectRole('parent')">
        <span class="icon">&#128218;</span>
        Parent
        <span class="subtitle">Full access to everything</span>
      </button>
      <button class="role-btn" onclick="selectRole('student')">
        <span class="icon">&#9997;&#65039;</span>
        Student
        <span class="subtitle">Pick your grade level</span>
      </button>
    </div>
  </div>

  <!-- ── PLACEMENT TEST ── -->
  <div id="test-screen">
    <div class="test-topbar">
      <h2>Placement Test</h2>
      <div class="test-progress">
        <span class="test-progress-text" id="test-progress-text">0 / 45</span>
        <div class="test-progress-bar">
          <div class="test-progress-fill" id="test-progress-fill" style="width: 0%"></div>
        </div>
        <button class="back-btn" onclick="quitTest()">Quit</button>
      </div>
    </div>
    <div class="test-body" id="test-body"></div>
  </div>

  <!-- ── TEST RESULTS ── -->
  <div id="results-screen"></div>

  <!-- ── LANGUAGE SELECTION ── -->
  <div id="language-screen">
    <h1>Want to learn a language?</h1>
    <p>Pick one, both, or skip — you can always change later</p>
    <div class="lang-options">
      <button class="lang-card" id="lang-spanish" onclick="toggleLang('spanish')">
        <span class="lang-icon">&#127466;&#127480;</span>
        Spanish
        <span class="lang-sub">Beginner to Advanced</span>
      </button>
      <button class="lang-card" id="lang-chinese" onclick="toggleLang('chinese')">
        <span class="lang-icon">&#127464;&#127475;</span>
        Chinese
        <span class="lang-sub">Pinyin to 1000+ Characters</span>
      </button>
    </div>
    <button class="test-next-btn" onclick="confirmLanguages()">Continue</button>
    <button class="back-btn" onclick="confirmLanguages()" style="margin-top:-8px;">Skip — no languages</button>
  </div>

  <!-- ── MAIN APP ── -->
  <div id="app-screen">
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:12px;">
        <button class="back-btn" onclick="goHome()">Home</button>
        <h2>Homeschool Curriculum</h2>
      </div>
      <div style="display:flex;align-items:center;gap:12px;">
        <span style="color:#94a3b8;font-size:0.85rem;" id="user-greeting"></span>
        <span class="role-badge" id="role-badge">PARENT</span>
        <button class="back-btn" onclick="signOut()">Sign Out</button>
      </div>
    </div>
    <div class="main-area">
      <div class="sidebar" id="sidebar"></div>
      <div class="content" id="content"></div>
    </div>
  </div>

  <script>
    // ── FIREBASE INIT ──
    firebase.initializeApp({
      apiKey: "AIzaSyCzigxOCPGs0WEiuQvWykPkkNjd59JBlWA",
      authDomain: "school-sign-in-project.firebaseapp.com",
      projectId: "school-sign-in-project",
      storageBucket: "school-sign-in-project.firebasestorage.app",
      messagingSenderId: "153730552434",
      appId: "1:153730552434:web:2856ce40417f617d1fa8eb"
    });
    const auth = firebase.auth();
    const CONTENT_BASE = 'https://raw.githubusercontent.com/BABAISABIGFATPOOP/homeschool-curriculum/master/';

    let currentRole = null;
    let currentGrade = null;
    let userName = '';
    let userDob = '';
    let isSignUpMode = false;

    // ── AUTO-LOGIN ON LAUNCH ──
    window.addEventListener('DOMContentLoaded', async () => {
      // Allow Enter key to submit
      document.querySelectorAll('#signin-screen input').forEach(input => {
        input.addEventListener('keydown', (e) => { if (e.key === 'Enter') handleAuth(); });
      });

      // Check if already logged in via Firebase
      const user = await new Promise(resolve => {
        auth.onAuthStateChanged(u => {
          if (u) {
            const parts = (u.displayName || '|').split('|');
            resolve({ name: parts[0] || '', dob: parts[1] || '' });
          } else resolve(null);
        });
      });
      if (user) {
        userName = user.name;
        userDob = user.dob;
        document.getElementById('signin-screen').style.display = 'none';
        document.getElementById('role-screen').style.display = 'flex';
        updateRoleScreenTitle();
      }
    });

    // ── TOGGLE SIGN IN / SIGN UP ──
    function toggleAuthMode(e) {
      e.preventDefault();
      isSignUpMode = !isSignUpMode;
      const nameGroup = document.getElementById('name-group');
      const dobGroup = document.getElementById('dob-group');
      const btn = document.getElementById('signin-btn');
      const subtitle = document.getElementById('auth-subtitle');
      const toggleText = document.getElementById('auth-toggle-text');
      const toggleLink = document.getElementById('auth-toggle-link');
      const error = document.getElementById('signin-error');
      error.textContent = '';

      if (isSignUpMode) {
        nameGroup.style.display = 'flex';
        dobGroup.style.display = 'flex';
        btn.textContent = 'Sign Up';
        subtitle.textContent = 'Create your account';
        toggleText.textContent = 'Already have an account?';
        toggleLink.textContent = 'Sign In';
      } else {
        nameGroup.style.display = 'none';
        dobGroup.style.display = 'none';
        btn.textContent = 'Sign In';
        subtitle.textContent = 'Sign in to get started';
        toggleText.textContent = "Don't have an account?";
        toggleLink.textContent = 'Sign Up';
      }
    }

    // ── HANDLE AUTH (SIGN IN OR SIGN UP) ──
    async function handleAuth() {
      const email = document.getElementById('signin-email').value.trim();
      const password = document.getElementById('signin-password').value;
      const error = document.getElementById('signin-error');
      const btn = document.getElementById('signin-btn');

      if (!email) { error.textContent = 'Please enter your email.'; return; }
      if (!password) { error.textContent = 'Please enter your password.'; return; }
      if (password.length < 6) { error.textContent = 'Password must be at least 6 characters.'; return; }

      btn.disabled = true;
      btn.textContent = isSignUpMode ? 'Signing up...' : 'Signing in...';
      error.textContent = '';

      try {
        let cred;
        if (isSignUpMode) {
          const name = document.getElementById('signin-name').value.trim();
          const dob = document.getElementById('signin-dob').value;
          if (!name) { error.textContent = 'Please enter your name.'; btn.disabled = false; btn.textContent = 'Sign Up'; return; }
          if (!dob) { error.textContent = 'Please enter your date of birth.'; btn.disabled = false; btn.textContent = 'Sign Up'; return; }
          cred = await auth.createUserWithEmailAndPassword(email, password);
          await cred.user.updateProfile({ displayName: name + '|' + dob });
          userName = name;
          userDob = dob;
        } else {
          cred = await auth.signInWithEmailAndPassword(email, password);
          const parts = (cred.user.displayName || '|').split('|');
          userName = parts[0] || '';
          userDob = parts[1] || '';
        }
        btn.disabled = false;
        btn.textContent = isSignUpMode ? 'Sign Up' : 'Sign In';
        document.getElementById('signin-screen').style.display = 'none';
        document.getElementById('role-screen').style.display = 'flex';
        updateRoleScreenTitle();
      } catch (e) {
        btn.disabled = false;
        btn.textContent = isSignUpMode ? 'Sign Up' : 'Sign In';
        let msg = e.message;
        if (msg.includes('auth/email-already-in-use')) msg = 'An account with this email already exists.';
        else if (msg.includes('auth/invalid-email')) msg = 'Please enter a valid email address.';
        else if (msg.includes('auth/invalid-credential')) msg = 'Incorrect email or password.';
        else if (msg.includes('auth/user-not-found')) msg = 'No account found with this email.';
        else if (msg.includes('auth/wrong-password')) msg = 'Incorrect password.';
        else if (msg.includes('auth/weak-password')) msg = 'Password must be at least 6 characters.';
        else if (msg.includes('auth/too-many-requests')) msg = 'Too many attempts. Please try again later.';
        error.textContent = msg;
      }
    }

    async function signOut() {

    }

    // ── SIDEBAR ──
    function buildSidebar() {
      const sidebar = document.getElementById('sidebar');
      sidebar.innerHTML = '';

      const addSection = (title, items, options = {}) => {
        const section = document.createElement('div');
        section.className = 'sidebar-section';
        const attrs = options.lang ? ` data-lang="${options.lang}"` : '';
        section.innerHTML = `<div class="sidebar-section-title"${attrs}>${title}</div>`;
        items.forEach(item => {
          const btn = document.createElement('button');
          btn.className = 'sidebar-item';
          btn.textContent = item.label;
          btn.onclick = () => {
            document.querySelectorAll('.sidebar-item').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            item.action();
          };
          section.appendChild(btn);
        });
        sidebar.appendChild(section);
      };

      // Home link
      addSection('Navigation', [{ label: 'Dashboard', action: showHomePage }]);

      if (currentRole === 'parent') {
        // Parents see everything
        const grades = [4, 5, 6, 7, 8, 9, 10];

        addSection('Curriculum Overview', grades.map(g => ({
          label: `Grade ${g}`,
          action: () => loadMarkdown(`curriculum/grade-${String(g).padStart(2, '0')}.md`)
        })));

          label: `Grade ${g}`,

        })));

        addSection('Placement Tests', [
          { label: 'Math', action: () => loadMarkdown('placement-tests/math.md') },
          { label: 'English', action: () => loadMarkdown('placement-tests/english.md') },
          { label: 'Biology', action: () => loadMarkdown('placement-tests/biology.md') },
          { label: 'Scoring Guide', action: () => loadMarkdown('placement-tests/scoring-guide.md') }

            <li>Your results will show a recommended grade level for each subject</li>
          </ul>
          <button class="test-next-btn" onclick="showTestQuestion()">Start Test</button>
        </div>
      `;
    }

    function updateTestProgress() {
      const total = 45;
      const pct = (testIndex / total) * 100;
      document.getElementById('test-progress-text').textContent = `${testIndex} / ${total}`;
      document.getElementById('test-progress-fill').style.width = pct + '%';
    }

    function getCurrentSubjectQuestions() {
      const subject = testSubjects[currentSubjectIndex];
      return testQuestions.filter(q => q.subject === subject);
    }

    function getSubjectQuestionIndex() {
      // How far into the current subject are we
      const subject = testSubjects[currentSubjectIndex];
      return testAnswers.filter(a => a.subject === subject).length;
    }

    function showTestQuestion() {
      const subjectQs = getCurrentSubjectQuestions();
      const sqIndex = getSubjectQuestionIndex();

      // If we've answered all questions in this subject, show the review
      if (sqIndex >= subjectQs.length) {
        showSegmentReview();
        return;
      }

      // If all subjects done
      if (currentSubjectIndex >= testSubjects.length) {
        showTestResults();
        return;
      }

      testSelectedOption = null;
      updateTestProgress();

      const q = subjectQs[sqIndex];
      const subjectClass = q.subject.toLowerCase();
      const body = document.getElementById('test-body');
      const questionNum = sqIndex + 1;
      const totalInSubject = subjectQs.length;

      body.innerHTML = `
        <span class="test-subject-badge ${subjectClass}">${q.subject} — Question ${questionNum} of ${totalInSubject}</span>
        <div class="test-question">${q.question}</div>
        <div class="test-options">
          ${q.options.map((opt, i) => `
            <button class="test-option" id="test-opt-${i}" onclick="selectTestOption(${i})">${opt}</button>
          `).join('')}
        </div>
        <button class="test-next-btn" id="test-next" onclick="nextTestQuestion()" disabled>Next</button>
      `;
    }

    function selectTestOption(index) {
      testSelectedOption = index;

      const subjectQs = getCurrentSubjectQuestions();
      const sqIndex = getSubjectQuestionIndex();
      const q = subjectQs[sqIndex];

      for (let i = 0; i < q.options.length; i++) {
        const btn = document.getElementById(`test-opt-${i}`);
        if (i === index) {
          btn.classList.add('selected');
        } else {
          btn.classList.remove('selected');
        }
      }

      document.getElementById('test-next').disabled = false;
    }

    function nextTestQuestion() {
      if (testSelectedOption === null) return;

      const subjectQs = getCurrentSubjectQuestions();
      const sqIndex = getSubjectQuestionIndex();
      const q = subjectQs[sqIndex];

      // Record answer (no reveal yet)
      testAnswers.push({
        id: q.id,
        subject: q.subject,
        grade: q.grade,
        selectedOption: testSelectedOption,
        correct: testSelectedOption === q.answer
      });

      testIndex++;
      showTestQuestion();
    }

    function showSegmentReview() {
      const subject = testSubjects[currentSubjectIndex];
      const subjectClass = subject.toLowerCase();
      const subjectQs = getCurrentSubjectQuestions();
      const subjectAnswers = testAnswers.filter(a => a.subject === subject);
      const correctCount = subjectAnswers.filter(a => a.correct).length;

      const body = document.getElementById('test-body');

      let reviewHTML = `
        <div style="max-width:700px;width:100%;overflow-y:auto;max-height:calc(100vh - 150px);">
          <h1 style="font-size:1.8rem;color:#f8fafc;text-align:center;margin-bottom:8px;">
            <span class="test-subject-badge ${subjectClass}" style="font-size:0.9rem;vertical-align:middle;margin-right:8px;">${subject}</span>
            Section Complete
          </h1>
          <p style="text-align:center;color:#94a3b8;margin-bottom:24px;">You got <strong style="color:#f8fafc;">${correctCount} out of ${subjectQs.length}</strong> correct</p>
      `;

      subjectQs.forEach((q, i) => {
        const answer = subjectAnswers[i];
        const isCorrect = answer.correct;
        const borderColor = isCorrect ? '#10b981' : '#ef4444';
        const icon = isCorrect ? '&#10003;' : '&#10007;';
        const iconColor = isCorrect ? '#10b981' : '#ef4444';

        reviewHTML += `
          <div style="background:#1e293b;border:1px solid ${borderColor};border-radius:10px;padding:16px;margin-bottom:12px;">
            <div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:8px;">
              <strong style="color:#f8fafc;font-size:0.95rem;">Q${i + 1}: ${q.question}</strong>
              <span style="color:${iconColor};font-size:1.2rem;min-width:24px;text-align:right;">${icon}</span>
            </div>
            <div style="color:#94a3b8;font-size:0.85rem;">
              Your answer: <span style="color:${isCorrect ? '#10b981' : '#ef4444'};font-weight:600;">${q.options[answer.selectedOption]}</span>
        `;

        if (!isCorrect) {
          reviewHTML += `
              <br>Correct answer: <span style="color:#10b981;font-weight:600;">${q.options[q.answer]}</span>
          `;
        }

        reviewHTML += `
            </div>
          </div>
        `;
      });

      const nextSubject = currentSubjectIndex < testSubjects.length - 1 ? testSubjects[currentSubjectIndex + 1] : null;
      const btnText = nextSubject ? `Continue to ${nextSubject}` : 'See Final Results';

      reviewHTML += `
        </div>
        <button class="test-next-btn" onclick="continueToNextSubject()" style="margin-top:16px;">${btnText}</button>
      `;

      body.innerHTML = reviewHTML;
    }

    function continueToNextSubject() {
      currentSubjectIndex++;
      if (currentSubjectIndex >= testSubjects.length) {
        showTestResults();
      } else {
        showTestQuestion();
      }
    }

    function showTestResults() {
      document.getElementById('test-screen').style.display = 'none';

      // Calculate grade level per subject
      const subjects = ['Math', 'English', 'Biology'];
      const results = {};

      subjects.forEach(subject => {
        const subjectAnswers = testAnswers.filter(a => a.subject === subject);
        const totalCorrect = subjectAnswers.filter(a => a.correct).length;

        // Find the highest grade where the student got at least 1 out of 2 correct
        // Questions are ordered by grade, ~2 per grade level
        let placementGrade = 4; // minimum

        // Group by grade
        const byGrade = {};
        subjectAnswers.forEach(a => {
          if (!byGrade[a.grade]) byGrade[a.grade] = { total: 0, correct: 0 };
          byGrade[a.grade].total++;
          if (a.correct) byGrade[a.grade].correct++;
        });

        // Walk up from grade 4, stop when they get less than half right
        for (let g = 4; g <= 10; g++) {
          if (byGrade[g]) {
            const pct = byGrade[g].correct / byGrade[g].total;
            if (pct >= 0.5) {
              placementGrade = g;
            } else {
              break;
            }
          }
        }

        results[subject] = { grade: placementGrade, correct: totalCorrect, total: subjectAnswers.length };
      });

      // Overall grade = most common or average, rounded
      const avgGrade = Math.round((results.Math.grade + results.English.grade + results.Biology.grade) / 3);
      const overallGrade = Math.max(4, Math.min(10, avgGrade));

      // Show results
      const screen = document.getElementById('results-screen');
      screen.style.display = 'flex';
      screen.innerHTML = `
        <div class="results-card">
          <h1>Your Results</h1>
          <div class="result-row">
            <span class="result-subject">Math</span>
            <div>
              <span class="result-grade math">Grade ${results.Math.grade}</span>
              <span class="result-score">${results.Math.correct}/${results.Math.total} correct</span>
            </div>
          </div>
          <div class="result-row">
            <span class="result-subject">English</span>
            <div>
              <span class="result-grade english">Grade ${results.English.grade}</span>
              <span class="result-score">${results.English.correct}/${results.English.total} correct</span>
            </div>
          </div>
          <div class="result-row">
            <span class="result-subject">Biology</span>
            <div>
              <span class="result-grade biology">Grade ${results.Biology.grade}</span>
              <span class="result-score">${results.Biology.correct}/${results.Biology.total} correct</span>
            </div>
          </div>
          <div class="result-overall">
            <div class="result-overall-label">Overall Placement</div>
            <div class="result-overall-grade">Grade ${overallGrade}</div>
            <p style="color:#94a3b8;font-size:0.9rem;margin-top:8px;">You'll start at Grade ${overallGrade} for all subjects.<br>Your teachers can adjust individual subjects if needed.</p>
          </div>
        </div>
        <button class="test-next-btn" onclick="acceptResults(${overallGrade})">Continue to My Curriculum</button>
        <button class="back-btn" onclick="retakeTest()">Retake Test</button>
      `;
    }

    function acceptResults(grade) {
      currentGrade = grade;
      document.getElementById('results-screen').style.display = 'none';
      // Show language selection before entering app
      selectedLanguages = [];
      document.getElementById('lang-spanish').classList.remove('selected');
      document.getElementById('lang-chinese').classList.remove('selected');
      document.getElementById('language-screen').style.display = 'flex';
    }

    function retakeTest() {
      document.getElementById('results-screen').style.display = 'none';
      startPlacementTest();
    }

    // ── LANGUAGE SELECTION ──
    function toggleLang(lang) {
      const idx = selectedLanguages.indexOf(lang);
      if (idx === -1) {
        selectedLanguages.push(lang);
      } else {
        selectedLanguages.splice(idx, 1);
      }
      document.getElementById('lang-' + lang).classList.toggle('selected');
    }

    function confirmLanguages() {
      document.getElementById('language-screen').style.display = 'none';
      showApp();
    }
  </script>

</body>
</html>
