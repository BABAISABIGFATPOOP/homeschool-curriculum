<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Homeschool Curriculum</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
    }

    /* ── Sign In Screen ── */
    #signin-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 30px;
    }

    #signin-screen h1 {
      font-size: 2.8rem;
      font-weight: 700;
      color: #f8fafc;
      text-align: center;
    }

    #signin-screen p {
      font-size: 1.1rem;
      color: #94a3b8;
      margin-top: -16px;
    }

    .signin-form {
      display: flex;
      flex-direction: column;
      gap: 20px;
      width: 360px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-group label {
      font-size: 0.85rem;
      font-weight: 600;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-group input {
      padding: 12px 16px;
      border: 2px solid #334155;
      border-radius: 10px;
      background: #1e293b;
      color: #f8fafc;
      font-size: 1rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }

    .form-group input:focus {
      border-color: #3b82f6;
    }

    .form-group input::placeholder {
      color: #475569;
    }

    .signin-btn {
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: #3b82f6;
      color: white;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 4px;
    }

    .signin-btn:hover {
      background: #2563eb;
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(59, 130, 246, 0.3);
    }

    .signin-btn:disabled {
      background: #334155;
      color: #64748b;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .signin-error {
      color: #f87171;
      font-size: 0.85rem;
      text-align: center;
      min-height: 20px;
    }

    /* ── Role Selection Screen ── */
    #role-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 40px;
    }

    #role-screen h1 {
      font-size: 2.8rem;
      font-weight: 700;
      color: #f8fafc;
      text-align: center;
    }

    #role-screen p {
      font-size: 1.1rem;
      color: #94a3b8;
      margin-top: -20px;
    }

    .role-buttons {
      display: flex;
      gap: 30px;
    }

    .role-btn {
      width: 260px;
      height: 200px;
      border: 2px solid #334155;
      border-radius: 16px;
      background: #1e293b;
      color: #f8fafc;
      font-size: 1.3rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    .role-btn:hover {
      border-color: #3b82f6;
      background: #1e3a5f;
      transform: translateY(-4px);
      box-shadow: 0 8px 30px rgba(59, 130, 246, 0.2);
    }

    .role-btn .icon {
      font-size: 3rem;
    }

    .role-btn .subtitle {
      font-size: 0.85rem;
      color: #94a3b8;
      font-weight: 400;
    }

    /* ── App Layout ── */
    #app-screen {
      display: none;
      height: 100vh;
    }

    /* ── Top Bar ── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 24px;
      background: #1e293b;
      border-bottom: 1px solid #334155;
    }

    .topbar h2 {
      font-size: 1.1rem;
      font-weight: 600;
      color: #f8fafc;
    }

    .topbar .role-badge {
      background: #3b82f6;
      color: white;
      padding: 4px 14px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .topbar .role-badge.student {
      background: #10b981;
    }

    .back-btn {
      background: none;
      border: 1px solid #475569;
      color: #94a3b8;
      padding: 6px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.15s;
    }

    .back-btn:hover {
      border-color: #64748b;
      color: #e2e8f0;
      background: #334155;
    }

    /* ── Main Content Area ── */
    .main-area {
      display: flex;
      height: calc(100vh - 53px);
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 260px;
      min-width: 260px;
      background: #1e293b;
      border-right: 1px solid #334155;
      overflow-y: auto;
      padding: 16px 0;
    }

    .sidebar-section {
      margin-bottom: 8px;
    }

    .sidebar-section-title {
      padding: 8px 20px;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #64748b;
      font-weight: 700;
    }

    .sidebar-item {
      display: block;
      width: 100%;
      text-align: left;
      padding: 10px 20px;
      border: none;
      background: none;
      color: #cbd5e1;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.1s;
    }

    .sidebar-item:hover {
      background: #334155;
      color: #f8fafc;
    }

    .sidebar-item.active {
      background: #3b82f6;
      color: white;
      font-weight: 600;
    }

    /* ── Content ── */
    .content {
      flex: 1;
      overflow-y: auto;
      padding: 32px 48px;
    }

    .content h1 { font-size: 2rem; color: #f8fafc; margin-bottom: 24px; border-bottom: 2px solid #334155; padding-bottom: 12px; }
    .content h2 { font-size: 1.4rem; color: #93c5fd; margin-top: 32px; margin-bottom: 12px; }
    .content h3 { font-size: 1.15rem; color: #60a5fa; margin-top: 24px; margin-bottom: 8px; }
    .content p { line-height: 1.7; margin-bottom: 12px; color: #cbd5e1; }
    .content ul, .content ol { margin-left: 24px; margin-bottom: 16px; }
    .content li { line-height: 1.7; margin-bottom: 4px; color: #cbd5e1; }
    .content strong { color: #f8fafc; }

    .content table {
      width: 100%;
      border-collapse: collapse;
      margin: 16px 0 24px;
      font-size: 0.9rem;
    }

    .content th {
      background: #334155;
      color: #f8fafc;
      padding: 10px 14px;
      text-align: left;
      font-weight: 600;
      border: 1px solid #475569;
    }

    .content td {
      padding: 10px 14px;
      border: 1px solid #334155;
      color: #cbd5e1;
    }

    .content tr:hover td {
      background: #1e293b;
    }

    /* ── Student Grade Picker ── */
    #grade-picker {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 30px;
    }

    #grade-picker h1 {
      font-size: 2.2rem;
      color: #f8fafc;
    }

    #grade-picker p {
      color: #94a3b8;
      margin-top: -16px;
    }

    .grade-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      max-width: 600px;
    }

    .grade-btn {
      width: 120px;
      height: 90px;
      border: 2px solid #334155;
      border-radius: 12px;
      background: #1e293b;
      color: #f8fafc;
      font-size: 1.2rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .grade-btn:hover {
      border-color: #10b981;
      background: #1e3b33;
      transform: translateY(-3px);
      box-shadow: 0 6px 20px rgba(16, 185, 129, 0.15);
    }

    .grade-btn .label {
      font-size: 0.75rem;
      color: #94a3b8;
      font-weight: 400;
    }

    /* ── Home cards (parent dashboard) ── */
    .home-cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
      margin-top: 24px;
    }

    .home-card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 24px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .home-card:hover {
      border-color: #3b82f6;
      transform: translateY(-2px);
      box-shadow: 0 4px 20px rgba(59, 130, 246, 0.1);
    }

    .home-card h3 {
      color: #f8fafc;
      margin-bottom: 8px;
      font-size: 1.1rem;
    }

    .home-card p {
      color: #94a3b8;
      font-size: 0.9rem;
      line-height: 1.5;
    }

    /* ── Placement Test ── */
    #test-screen {
      display: none;
      flex-direction: column;
      min-height: 100vh;
    }

    .test-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 24px;
      background: #1e293b;
      border-bottom: 1px solid #334155;
    }

    .test-topbar h2 { font-size: 1.1rem; color: #f8fafc; }

    .test-progress {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .test-progress-bar {
      width: 200px;
      height: 8px;
      background: #334155;
      border-radius: 4px;
      overflow: hidden;
    }

    .test-progress-fill {
      height: 100%;
      background: #3b82f6;
      border-radius: 4px;
      transition: width 0.3s ease;
    }

    .test-progress-text {
      font-size: 0.85rem;
      color: #94a3b8;
      min-width: 60px;
    }

    .test-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px;
      gap: 30px;
    }

    .test-subject-badge {
      padding: 4px 14px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .test-subject-badge.math { background: #3b82f6; color: white; }
    .test-subject-badge.english { background: #8b5cf6; color: white; }
    .test-subject-badge.biology { background: #10b981; color: white; }

    .test-question {
      font-size: 1.3rem;
      color: #f8fafc;
      text-align: center;
      max-width: 700px;
      line-height: 1.6;
    }

    .test-options {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
      max-width: 500px;
    }

    .test-option {
      padding: 14px 20px;
      border: 2px solid #334155;
      border-radius: 10px;
      background: #1e293b;
      color: #e2e8f0;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.15s;
      text-align: left;
    }

    .test-option:hover {
      border-color: #3b82f6;
      background: #1e3a5f;
    }

    .test-option.selected {
      border-color: #3b82f6;
      background: #1e3a5f;
    }

    .test-option.correct {
      border-color: #10b981;
      background: #064e3b;
    }

    .test-option.wrong {
      border-color: #ef4444;
      background: #450a0a;
    }

    .test-next-btn {
      padding: 12px 40px;
      border: none;
      border-radius: 10px;
      background: #3b82f6;
      color: white;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .test-next-btn:hover {
      background: #2563eb;
    }

    .test-next-btn:disabled {
      background: #334155;
      color: #64748b;
      cursor: not-allowed;
    }

    /* ── Test Rules Screen ── */
    .test-rules {
      max-width: 600px;
      text-align: center;
    }

    .test-rules h1 {
      font-size: 2rem;
      color: #f8fafc;
      margin-bottom: 24px;
    }

    .test-rules ul {
      text-align: left;
      margin: 20px 0 30px 20px;
      list-style: none;
    }

    .test-rules ul li {
      padding: 8px 0;
      color: #cbd5e1;
      font-size: 1rem;
      line-height: 1.6;
    }

    .test-rules ul li::before {
      content: '\2022';
      color: #3b82f6;
      font-weight: bold;
      display: inline-block;
      width: 1.2em;
    }

    /* ── Results Screen ── */
    #results-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 30px;
      padding: 40px;
    }

    .results-card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 32px;
      max-width: 550px;
      width: 100%;
    }

    .results-card h1 {
      font-size: 1.8rem;
      color: #f8fafc;
      margin-bottom: 24px;
      text-align: center;
    }

    .result-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 0;
      border-bottom: 1px solid #334155;
    }

    .result-row:last-child { border-bottom: none; }

    .result-subject {
      font-size: 1rem;
      color: #cbd5e1;
      font-weight: 600;
    }

    .result-grade {
      font-size: 1.1rem;
      font-weight: 700;
      padding: 4px 16px;
      border-radius: 20px;
    }

    .result-grade.math { background: #1e3a5f; color: #60a5fa; }
    .result-grade.english { background: #2e1065; color: #a78bfa; }
    .result-grade.biology { background: #064e3b; color: #34d399; }

    .result-overall {
      text-align: center;
      margin-top: 20px;
      padding-top: 20px;
      border-top: 2px solid #334155;
    }

    .result-overall-grade {
      font-size: 2.5rem;
      font-weight: 800;
      color: #f8fafc;
    }

    .result-overall-label {
      font-size: 0.9rem;
      color: #94a3b8;
      margin-top: 4px;
    }

    .result-score {
      font-size: 0.85rem;
      color: #64748b;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #0f172a; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #475569; }
  </style>
</head>
<body>

  <!-- ── AUTH SCREEN ── -->
  <div id="signin-screen">
    <h1>Homeschool Curriculum</h1>
    <p id="auth-subtitle">Sign in to get started</p>
    <div class="signin-form">
      <div class="form-group" id="name-group" style="display:none;">
        <label>Name</label>
        <input type="text" id="signin-name" placeholder="Enter your name" autocomplete="off">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="signin-email" placeholder="Enter your email" autocomplete="off">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="signin-password" placeholder="Enter your password">
      </div>
      <div class="form-group" id="dob-group" style="display:none;">
        <label>Date of Birth</label>
        <input type="date" id="signin-dob">
      </div>
      <div class="signin-error" id="signin-error"></div>
      <button class="signin-btn" id="signin-btn" onclick="handleAuth()">Sign In</button>
      <p style="text-align:center;color:#94a3b8;font-size:0.9rem;">
        <span id="auth-toggle-text">Don't have an account?</span>
        <a href="#" id="auth-toggle-link" onclick="toggleAuthMode(event)" style="color:#3b82f6;text-decoration:none;font-weight:600;">Sign Up</a>
      </p>
    </div>
  </div>

  <!-- ── ROLE SELECTION ── -->
  <div id="role-screen">
    <h1 id="role-screen-title">Homeschool Curriculum</h1>
    <p>Grades 4 – 10 &nbsp;|&nbsp; Math, English, Biology</p>
    <div class="role-buttons">
      <button class="role-btn" onclick="selectRole('parent')">
        <span class="icon">&#128218;</span>
        Parent
        <span class="subtitle">Full access to everything</span>
      </button>
      <button class="role-btn" onclick="selectRole('student')">
        <span class="icon">&#9997;&#65039;</span>
        Student
        <span class="subtitle">Pick your grade level</span>
      </button>
    </div>
  </div>

  <!-- ── PLACEMENT TEST ── -->
  <div id="test-screen">
    <div class="test-topbar">
      <h2>Placement Test</h2>
      <div class="test-progress">
        <span class="test-progress-text" id="test-progress-text">0 / 45</span>
        <div class="test-progress-bar">
          <div class="test-progress-fill" id="test-progress-fill" style="width: 0%"></div>
        </div>
        <button class="back-btn" onclick="quitTest()">Quit</button>
      </div>
    </div>
    <div class="test-body" id="test-body"></div>
  </div>

  <!-- ── TEST RESULTS ── -->
  <div id="results-screen"></div>

  <!-- ── MAIN APP ── -->
  <div id="app-screen">
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:12px;">
        <button class="back-btn" onclick="goHome()">Home</button>
        <h2>Homeschool Curriculum</h2>
      </div>
      <div style="display:flex;align-items:center;gap:12px;">
        <span style="color:#94a3b8;font-size:0.85rem;" id="user-greeting"></span>
        <span class="role-badge" id="role-badge">PARENT</span>
        <button class="back-btn" onclick="signOut()">Sign Out</button>
      </div>
    </div>
    <div class="main-area">
      <div class="sidebar" id="sidebar"></div>
      <div class="content" id="content"></div>
    </div>
  </div>

  <script>
    let currentRole = null;
    let currentGrade = null;
    let userName = '';
    let userDob = '';
    let isSignUpMode = false;

    // ── CHECK FOR UPDATES & AUTO-LOGIN ON LAUNCH ──
    window.addEventListener('DOMContentLoaded', async () => {
      window.api.checkForUpdate();

      // Allow Enter key to submit
      document.querySelectorAll('#signin-screen input').forEach(input => {
        input.addEventListener('keydown', (e) => { if (e.key === 'Enter') handleAuth(); });
      });

      // Check if already logged in via Firebase
      const user = await window.api.authCurrentUser();
      if (user) {
        userName = user.name;
        userDob = user.dob;
        document.getElementById('signin-screen').style.display = 'none';
        document.getElementById('role-screen').style.display = 'flex';
        updateRoleScreenTitle();
      }
    });

    // ── TOGGLE SIGN IN / SIGN UP ──
    function toggleAuthMode(e) {
      e.preventDefault();
      isSignUpMode = !isSignUpMode;
      const nameGroup = document.getElementById('name-group');
      const dobGroup = document.getElementById('dob-group');
      const btn = document.getElementById('signin-btn');
      const subtitle = document.getElementById('auth-subtitle');
      const toggleText = document.getElementById('auth-toggle-text');
      const toggleLink = document.getElementById('auth-toggle-link');
      const error = document.getElementById('signin-error');
      error.textContent = '';

      if (isSignUpMode) {
        nameGroup.style.display = 'flex';
        dobGroup.style.display = 'flex';
        btn.textContent = 'Sign Up';
        subtitle.textContent = 'Create your account';
        toggleText.textContent = 'Already have an account?';
        toggleLink.textContent = 'Sign In';
      } else {
        nameGroup.style.display = 'none';
        dobGroup.style.display = 'none';
        btn.textContent = 'Sign In';
        subtitle.textContent = 'Sign in to get started';
        toggleText.textContent = "Don't have an account?";
        toggleLink.textContent = 'Sign Up';
      }
    }

    // ── HANDLE AUTH (SIGN IN OR SIGN UP) ──
    async function handleAuth() {
      const email = document.getElementById('signin-email').value.trim();
      const password = document.getElementById('signin-password').value;
      const error = document.getElementById('signin-error');
      const btn = document.getElementById('signin-btn');

      if (!email) { error.textContent = 'Please enter your email.'; return; }
      if (!password) { error.textContent = 'Please enter your password.'; return; }
      if (password.length < 6) { error.textContent = 'Password must be at least 6 characters.'; return; }

      btn.disabled = true;
      btn.textContent = isSignUpMode ? 'Signing up...' : 'Signing in...';
      error.textContent = '';

      let result;
      if (isSignUpMode) {
        const name = document.getElementById('signin-name').value.trim();
        const dob = document.getElementById('signin-dob').value;
        if (!name) { error.textContent = 'Please enter your name.'; btn.disabled = false; btn.textContent = 'Sign Up'; return; }
        if (!dob) { error.textContent = 'Please enter your date of birth.'; btn.disabled = false; btn.textContent = 'Sign Up'; return; }
        result = await window.api.authSignUp(email, password, name, dob);
      } else {
        result = await window.api.authLogIn(email, password);
      }

      btn.disabled = false;
      btn.textContent = isSignUpMode ? 'Sign Up' : 'Sign In';

      if (result.success) {
        userName = result.user.name;
        userDob = result.user.dob;
        document.getElementById('signin-screen').style.display = 'none';
        document.getElementById('role-screen').style.display = 'flex';
        updateRoleScreenTitle();
      } else {
        // Clean up Firebase error messages
        let msg = result.error;
        if (msg.includes('auth/email-already-in-use')) msg = 'An account with this email already exists.';
        else if (msg.includes('auth/invalid-email')) msg = 'Please enter a valid email address.';
        else if (msg.includes('auth/invalid-credential')) msg = 'Incorrect email or password.';
        else if (msg.includes('auth/user-not-found')) msg = 'No account found with this email.';
        else if (msg.includes('auth/wrong-password')) msg = 'Incorrect password.';
        else if (msg.includes('auth/weak-password')) msg = 'Password must be at least 6 characters.';
        else if (msg.includes('auth/too-many-requests')) msg = 'Too many attempts. Please try again later.';
        error.textContent = msg;
      }
    }

    // ── SIGN OUT ──
    async function signOut() {
      await window.api.authLogOut();
      userName = '';
      userDob = '';
      currentRole = null;
      currentGrade = null;
      document.getElementById('app-screen').style.display = 'none';
      document.getElementById('grade-picker').style.display = 'none';
      document.getElementById('role-screen').style.display = 'none';
      document.getElementById('signin-screen').style.display = 'flex';
      document.getElementById('signin-email').value = '';
      document.getElementById('signin-password').value = '';
      document.getElementById('signin-name').value = '';
      document.getElementById('signin-dob').value = '';
      document.getElementById('signin-error').textContent = '';
      // Reset to sign-in mode
      if (isSignUpMode) toggleAuthMode({ preventDefault: () => {} });
    }

    // ── ROLE SELECTION ──
    function selectRole(role) {
      currentRole = role;
      if (role === 'student') {
        document.getElementById('role-screen').style.display = 'none';
        startPlacementTest();
      } else {
        showApp();
      }
    }

    // Update role screen title with name whenever it's shown
    function updateRoleScreenTitle() {
      const title = document.getElementById('role-screen-title');
      if (userName) {
        title.textContent = `Welcome, ${userName}!`;
      } else {
        title.textContent = 'Homeschool Curriculum';
      }
    }

    function selectGrade(grade) {
      currentGrade = grade;
      document.getElementById('grade-picker').style.display = 'none';
      showApp();
    }

    function goHome() {
      currentRole = null;
      currentGrade = null;
      document.getElementById('app-screen').style.display = 'none';
      document.getElementById('test-screen').style.display = 'none';
      document.getElementById('results-screen').style.display = 'none';
      document.getElementById('signin-screen').style.display = 'none';
      document.getElementById('role-screen').style.display = 'flex';
      updateRoleScreenTitle();
    }

    // ── SHOW APP ──
    function showApp() {
      document.getElementById('role-screen').style.display = 'none';
      document.getElementById('grade-picker').style.display = 'none';
      document.getElementById('app-screen').style.display = 'block';

      document.getElementById('user-greeting').textContent = userName ? `Hi, ${userName}` : '';

      const badge = document.getElementById('role-badge');
      if (currentRole === 'student') {
        badge.textContent = `STUDENT — GRADE ${currentGrade}`;
        badge.className = 'role-badge student';
      } else {
        badge.textContent = 'PARENT';
        badge.className = 'role-badge';
      }

      buildSidebar();
      showHomePage();
    }

    // ── SIDEBAR ──
    function buildSidebar() {
      const sidebar = document.getElementById('sidebar');
      sidebar.innerHTML = '';

      const addSection = (title, items) => {
        const section = document.createElement('div');
        section.className = 'sidebar-section';
        section.innerHTML = `<div class="sidebar-section-title">${title}</div>`;
        items.forEach(item => {
          const btn = document.createElement('button');
          btn.className = 'sidebar-item';
          btn.textContent = item.label;
          btn.onclick = () => {
            document.querySelectorAll('.sidebar-item').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            item.action();
          };
          section.appendChild(btn);
        });
        sidebar.appendChild(section);
      };

      // Home link
      addSection('Navigation', [{ label: 'Dashboard', action: showHomePage }]);

      if (currentRole === 'parent') {
        // Parents see everything
        const grades = [4, 5, 6, 7, 8, 9, 10];

        addSection('Curriculum Overview', grades.map(g => ({
          label: `Grade ${g}`,
          action: () => loadMarkdown(`curriculum/grade-${String(g).padStart(2, '0')}.md`)
        })));

        addSection('Yearly Plans (36 Weeks)', grades.map(g => ({
          label: `Grade ${g}`,
          action: () => loadMarkdown(`yearly-plans/grade-${String(g).padStart(2, '0')}.md`)
        })));

        addSection('Placement Tests', [
          { label: 'Math', action: () => loadMarkdown('placement-tests/math.md') },
          { label: 'English', action: () => loadMarkdown('placement-tests/english.md') },
          { label: 'Biology', action: () => loadMarkdown('placement-tests/biology.md') },
          { label: 'Scoring Guide', action: () => loadMarkdown('placement-tests/scoring-guide.md') }
        ]);

        addSection('Schedule', [
          { label: 'Weekly Schedule', action: () => loadMarkdown('schedule.md') }
        ]);

      } else {
        // Students see their grade only
        const g = currentGrade;
        const pad = String(g).padStart(2, '0');

        addSection('My Grade', [
          { label: 'Curriculum Overview', action: () => loadMarkdown(`curriculum/grade-${pad}.md`) },
          { label: 'Full Year Plan', action: () => loadMarkdown(`yearly-plans/grade-${pad}.md`) }
        ]);

        addSection('Placement Tests', [
          { label: 'Math', action: () => loadMarkdown('placement-tests/math.md') },
          { label: 'English', action: () => loadMarkdown('placement-tests/english.md') },
          { label: 'Biology', action: () => loadMarkdown('placement-tests/biology.md') }
        ]);

        addSection('Schedule', [
          { label: 'Weekly Schedule', action: () => loadMarkdown('schedule.md') }
        ]);
      }
    }

    // ── LOAD MARKDOWN ──
    async function loadMarkdown(filePath) {
      try {
        const md = await window.api.readFile(filePath);
        document.getElementById('content').innerHTML = window.api.parseMarkdown(md);
      } catch (e) {
        document.getElementById('content').innerHTML = `<h1>Error</h1><p>Could not load ${filePath}</p>`;
      }
    }

    // ── HOME / DASHBOARD ──
    function showHomePage() {
      document.querySelectorAll('.sidebar-item').forEach(b => b.classList.remove('active'));
      const firstItem = document.querySelector('.sidebar-item');
      if (firstItem) firstItem.classList.add('active');

      const content = document.getElementById('content');

      if (currentRole === 'parent') {
        content.innerHTML = `
          <h1>Parent Dashboard</h1>
          <p>Welcome${userName ? ', ' + userName : ''}! You have full access to the curriculum, yearly plans, placement tests, and scheduling for all grades (4–10).</p>
          <div class="home-cards">
            <div class="home-card" onclick="document.querySelectorAll('.sidebar-section')[1].querySelector('.sidebar-item').click()">
              <h3>Curriculum Overview</h3>
              <p>See what each grade covers in Math, English, and Biology.</p>
            </div>
            <div class="home-card" onclick="document.querySelectorAll('.sidebar-section')[2].querySelector('.sidebar-item').click()">
              <h3>Yearly Plans</h3>
              <p>36-week, quarter-by-quarter breakdown for every grade.</p>
            </div>
            <div class="home-card" onclick="document.querySelectorAll('.sidebar-section')[3].querySelector('.sidebar-item').click()">
              <h3>Placement Tests</h3>
              <p>Figure out what grade level to start each subject at.</p>
            </div>
            <div class="home-card" onclick="document.querySelectorAll('.sidebar-section')[4].querySelector('.sidebar-item').click()">
              <h3>Weekly Schedule</h3>
              <p>Suggested daily time blocks for each subject.</p>
            </div>
          </div>
          <h2 style="margin-top: 40px;">Getting Started</h2>
          <ol>
            <li><strong>Give the placement tests</strong> — have your student work through each subject's test until the questions get too hard.</li>
            <li><strong>Check the scoring guide</strong> — it tells you what grade level to start at based on results.</li>
            <li><strong>Open the yearly plan</strong> for the right grade and start at Week 1.</li>
            <li>It's totally normal to be at different grade levels for different subjects!</li>
          </ol>
        `;
      } else {
        const g = currentGrade;
        content.innerHTML = `
          <h1>Welcome${userName ? ', ' + userName : ''} — Grade ${g}!</h1>
          <p>Here's everything you need for your school year.</p>
          <div class="home-cards">
            <div class="home-card" onclick="document.querySelectorAll('.sidebar-section')[1].querySelector('.sidebar-item').click()">
              <h3>What You'll Learn</h3>
              <p>See all the topics you'll cover this year in Math, English, and Biology.</p>
            </div>
            <div class="home-card" onclick="document.querySelectorAll('.sidebar-section')[1].querySelectorAll('.sidebar-item')[1].click()">
              <h3>Full Year Plan</h3>
              <p>Your week-by-week schedule — see exactly what's coming up.</p>
            </div>
            <div class="home-card" onclick="document.querySelectorAll('.sidebar-section')[2].querySelector('.sidebar-item').click()">
              <h3>Placement Tests</h3>
              <p>Take a test to make sure you're starting at the right level.</p>
            </div>
            <div class="home-card" onclick="document.querySelectorAll('.sidebar-section')[3].querySelector('.sidebar-item').click()">
              <h3>Weekly Schedule</h3>
              <p>See how your school week is laid out.</p>
            </div>
          </div>
        `;
      }
    }
    // ═══════════════════════════════════════
    // PLACEMENT TEST
    // ═══════════════════════════════════════

    let testQuestions = [];
    let testIndex = 0;
    let testAnswers = []; // { id, subject, grade, correct }
    let testSelectedOption = null;
    let testAnswered = false;

    function startPlacementTest() {
      document.getElementById('test-screen').style.display = 'flex';
      testQuestions = window.api.getQuestions();
      testIndex = 0;
      testAnswers = [];
      testSelectedOption = null;
      testAnswered = false;
      updateTestProgress();
      showTestRules();
    }

    function quitTest() {
      document.getElementById('test-screen').style.display = 'none';
      goHome();
    }

    function showTestRules() {
      const body = document.getElementById('test-body');
      body.innerHTML = `
        <div class="test-rules">
          <h1>Placement Test</h1>
          <p style="color:#94a3b8;font-size:1.05rem;margin-bottom:8px;">This test will determine your grade level for each subject.</p>
          <ul>
            <li>There are <strong>45 questions</strong> — 15 Math, 15 English, 15 Biology</li>
            <li>Questions start easy and get harder as you go</li>
            <li>Pick the best answer for each question</li>
            <li><strong>No calculator</strong> allowed for math questions</li>
            <li>It's okay to not know the answer — just pick your best guess</li>
            <li>Don't worry about getting everything right. The test finds <strong>where you should start</strong>, not what you already know perfectly</li>
            <li>Take your time — there is <strong>no time limit</strong></li>
            <li>Your results will show a recommended grade level for each subject</li>
          </ul>
          <button class="test-next-btn" onclick="showTestQuestion()">Start Test</button>
        </div>
      `;
    }

    function updateTestProgress() {
      const total = 45;
      const pct = (testIndex / total) * 100;
      document.getElementById('test-progress-text').textContent = `${testIndex} / ${total}`;
      document.getElementById('test-progress-fill').style.width = pct + '%';
    }

    function showTestQuestion() {
      if (testIndex >= testQuestions.length) {
        showTestResults();
        return;
      }

      testSelectedOption = null;
      testAnswered = false;
      updateTestProgress();

      const q = testQuestions[testIndex];
      const subjectClass = q.subject.toLowerCase();
      const body = document.getElementById('test-body');

      body.innerHTML = `
        <span class="test-subject-badge ${subjectClass}">${q.subject}</span>
        <div class="test-question">${q.question}</div>
        <div class="test-options">
          ${q.options.map((opt, i) => `
            <button class="test-option" id="test-opt-${i}" onclick="selectTestOption(${i})">${opt}</button>
          `).join('')}
        </div>
        <button class="test-next-btn" id="test-next" onclick="nextTestQuestion()" disabled>Next</button>
      `;
    }

    function selectTestOption(index) {
      if (testAnswered) return;
      testAnswered = true;
      testSelectedOption = index;

      const q = testQuestions[testIndex];
      const correct = q.answer;

      // Highlight correct and wrong
      for (let i = 0; i < q.options.length; i++) {
        const btn = document.getElementById(`test-opt-${i}`);
        btn.style.pointerEvents = 'none';
        if (i === correct) {
          btn.classList.add('correct');
        } else if (i === index && i !== correct) {
          btn.classList.add('wrong');
        }
      }

      // Record answer
      testAnswers.push({
        id: q.id,
        subject: q.subject,
        grade: q.grade,
        correct: index === correct
      });

      document.getElementById('test-next').disabled = false;
    }

    function nextTestQuestion() {
      testIndex++;
      showTestQuestion();
    }

    function showTestResults() {
      document.getElementById('test-screen').style.display = 'none';

      // Calculate grade level per subject
      const subjects = ['Math', 'English', 'Biology'];
      const results = {};

      subjects.forEach(subject => {
        const subjectAnswers = testAnswers.filter(a => a.subject === subject);
        const totalCorrect = subjectAnswers.filter(a => a.correct).length;

        // Find the highest grade where the student got at least 1 out of 2 correct
        // Questions are ordered by grade, ~2 per grade level
        let placementGrade = 4; // minimum

        // Group by grade
        const byGrade = {};
        subjectAnswers.forEach(a => {
          if (!byGrade[a.grade]) byGrade[a.grade] = { total: 0, correct: 0 };
          byGrade[a.grade].total++;
          if (a.correct) byGrade[a.grade].correct++;
        });

        // Walk up from grade 4, stop when they get less than half right
        for (let g = 4; g <= 10; g++) {
          if (byGrade[g]) {
            const pct = byGrade[g].correct / byGrade[g].total;
            if (pct >= 0.5) {
              placementGrade = g;
            } else {
              break;
            }
          }
        }

        results[subject] = { grade: placementGrade, correct: totalCorrect, total: subjectAnswers.length };
      });

      // Overall grade = most common or average, rounded
      const avgGrade = Math.round((results.Math.grade + results.English.grade + results.Biology.grade) / 3);
      const overallGrade = Math.max(4, Math.min(10, avgGrade));

      // Show results
      const screen = document.getElementById('results-screen');
      screen.style.display = 'flex';
      screen.innerHTML = `
        <div class="results-card">
          <h1>Your Results</h1>
          <div class="result-row">
            <span class="result-subject">Math</span>
            <div>
              <span class="result-grade math">Grade ${results.Math.grade}</span>
              <span class="result-score">${results.Math.correct}/${results.Math.total} correct</span>
            </div>
          </div>
          <div class="result-row">
            <span class="result-subject">English</span>
            <div>
              <span class="result-grade english">Grade ${results.English.grade}</span>
              <span class="result-score">${results.English.correct}/${results.English.total} correct</span>
            </div>
          </div>
          <div class="result-row">
            <span class="result-subject">Biology</span>
            <div>
              <span class="result-grade biology">Grade ${results.Biology.grade}</span>
              <span class="result-score">${results.Biology.correct}/${results.Biology.total} correct</span>
            </div>
          </div>
          <div class="result-overall">
            <div class="result-overall-label">Overall Placement</div>
            <div class="result-overall-grade">Grade ${overallGrade}</div>
            <p style="color:#94a3b8;font-size:0.9rem;margin-top:8px;">You'll start at Grade ${overallGrade} for all subjects.<br>Your teachers can adjust individual subjects if needed.</p>
          </div>
        </div>
        <button class="test-next-btn" onclick="acceptResults(${overallGrade})">Continue to My Curriculum</button>
        <button class="back-btn" onclick="retakeTest()">Retake Test</button>
      `;
    }

    function acceptResults(grade) {
      currentGrade = grade;
      document.getElementById('results-screen').style.display = 'none';
      showApp();
    }

    function retakeTest() {
      document.getElementById('results-screen').style.display = 'none';
      startPlacementTest();
    }
  </script>

</body>
