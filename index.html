<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Homeschool Curriculum</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
    }

    /* ── Sign In Screen ── */
    #signin-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 30px;
    }

    #signin-screen h1 {
      font-size: 2.8rem;
      font-weight: 700;
      color: #f8fafc;
      text-align: center;
    }

    #signin-screen p {
      font-size: 1.1rem;
      color: #94a3b8;
      margin-top: -16px;
    }

    .signin-form {
      display: flex;
      flex-direction: column;
      gap: 20px;
      width: 360px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-group label {
      font-size: 0.85rem;
      font-weight: 600;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-group input {
      padding: 12px 16px;
      border: 2px solid #334155;
      border-radius: 10px;
      background: #1e293b;
      color: #f8fafc;
      font-size: 1rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }

    .form-group input:focus {
      border-color: #3b82f6;
    }

    .form-group input::placeholder {
      color: #475569;
    }

    .signin-btn {
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: #3b82f6;
      color: white;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 4px;
    }

    .signin-btn:hover {
      background: #2563eb;
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(59, 130, 246, 0.3);
    }

    .signin-btn:disabled {
      background: #334155;
      color: #64748b;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .signin-error {
      color: #f87171;
      font-size: 0.85rem;
      text-align: center;
      min-height: 20px;
    }

    /* ── Role Selection Screen ── */
    #role-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 40px;
    }

    #role-screen h1 {
      font-size: 2.8rem;
      font-weight: 700;
      color: #f8fafc;
      text-align: center;
    }

    #role-screen p {
      font-size: 1.1rem;
      color: #94a3b8;
      margin-top: -20px;
    }

    .role-buttons {
      display: flex;
      gap: 30px;
    }

    .role-btn {
      width: 260px;
      height: 200px;
      border: 2px solid #334155;
      border-radius: 16px;
      background: #1e293b;
      color: #f8fafc;
      font-size: 1.3rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    .role-btn:hover {
      border-color: #3b82f6;
      background: #1e3a5f;
      transform: translateY(-4px);
      box-shadow: 0 8px 30px rgba(59, 130, 246, 0.2);
    }

    .role-btn .icon {
      font-size: 3rem;
    }

    .role-btn .subtitle {
      font-size: 0.85rem;
      color: #94a3b8;
      font-weight: 400;
    }

    /* ── App Layout ── */
    #app-screen {
      display: none;
      height: 100vh;
    }

    /* ── Top Bar ── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 24px;
      background: #1e293b;
      border-bottom: 1px solid #334155;
    }

    .topbar h2 {
      font-size: 1.1rem;
      font-weight: 600;
      color: #f8fafc;
    }

    .topbar .role-badge {
      background: #3b82f6;
      color: white;
      padding: 4px 14px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .topbar .role-badge.student {
      background: #10b981;
    }

    .back-btn {
      background: none;
      border: 1px solid #475569;
      color: #94a3b8;
      padding: 6px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.15s;
    }

    .back-btn:hover {
      border-color: #64748b;
      color: #e2e8f0;
      background: #334155;
    }

    /* ── Main Content Area ── */
    .main-area {
      display: flex;
      height: calc(100vh - 53px);
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 260px;
      min-width: 260px;
      background: #1e293b;
      border-right: 1px solid #334155;
      overflow-y: auto;
      padding: 16px 0;
    }

    .sidebar-section {
      margin-bottom: 8px;
    }

    .sidebar-section-title {
      padding: 8px 20px;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #64748b;
      font-weight: 700;
    }

    .sidebar-item {
      display: block;
      width: 100%;
      text-align: left;
      padding: 10px 20px;
      border: none;
      background: none;
      color: #cbd5e1;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.1s;
    }

    .sidebar-item:hover {
      background: #334155;
      color: #f8fafc;
    }

    .sidebar-item.active {
      background: #3b82f6;
      color: white;
      font-weight: 600;
    }

    /* ── Content ── */
    .content {
      flex: 1;
      overflow-y: auto;
      padding: 32px 48px;
    }

    .content h1 { font-size: 2rem; color: #f8fafc; margin-bottom: 24px; border-bottom: 2px solid #334155; padding-bottom: 12px; }
    .content h2 { font-size: 1.4rem; color: #93c5fd; margin-top: 32px; margin-bottom: 12px; }
    .content h3 { font-size: 1.15rem; color: #60a5fa; margin-top: 24px; margin-bottom: 8px; }
    .content p { line-height: 1.7; margin-bottom: 12px; color: #cbd5e1; }
    .content ul, .content ol { margin-left: 24px; margin-bottom: 16px; }
    .content li { line-height: 1.7; margin-bottom: 4px; color: #cbd5e1; }
    .content strong { color: #f8fafc; }

    .content table {
      width: 100%;
      border-collapse: collapse;
      margin: 16px 0 24px;
      font-size: 0.9rem;
    }

    .content th {
      background: #334155;
      color: #f8fafc;
      padding: 10px 14px;
      text-align: left;
      font-weight: 600;
      border: 1px solid #475569;
    }

    .content td {
      padding: 10px 14px;
      border: 1px solid #334155;
      color: #cbd5e1;
    }

    .content tr:hover td {
      background: #1e293b;
    }

    /* ── Student Grade Picker ── */
    #grade-picker {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 30px;
    }

    #grade-picker h1 {
      font-size: 2.2rem;
      color: #f8fafc;
    }

    #grade-picker p {
      color: #94a3b8;
      margin-top: -16px;
    }

    .grade-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      max-width: 600px;
    }

    .grade-btn {
      width: 120px;
      height: 90px;
      border: 2px solid #334155;
      border-radius: 12px;
      background: #1e293b;
      color: #f8fafc;
      font-size: 1.2rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .grade-btn:hover {
      border-color: #10b981;
      background: #1e3b33;
      transform: translateY(-3px);
      box-shadow: 0 6px 20px rgba(16, 185, 129, 0.15);
    }

    .grade-btn .label {
      font-size: 0.75rem;
      color: #94a3b8;
      font-weight: 400;
    }

    /* ── Home cards (parent dashboard) ── */
    .home-cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
      margin-top: 24px;
    }

    .home-card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 24px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .home-card:hover {
      border-color: #3b82f6;
      transform: translateY(-2px);
      box-shadow: 0 4px 20px rgba(59, 130, 246, 0.1);
    }

    .home-card h3 {
      color: #f8fafc;
      margin-bottom: 8px;
      font-size: 1.1rem;
    }

    .home-card p {
      color: #94a3b8;
      font-size: 0.9rem;
      line-height: 1.5;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #0f172a; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #475569; }
  </style>
</head>
<body>

  <!-- ── SIGN IN ── -->
  <div id="signin-screen">
    <h1>Homeschool Curriculum</h1>
    <p>Sign in to get started</p>
    <div class="signin-form">
      <div class="form-group">
        <label>Name</label>
        <input type="text" id="signin-name" placeholder="Enter your name" autocomplete="off">
      </div>
      <div class="form-group">
        <label>Date of Birth</label>
        <input type="date" id="signin-dob">
      </div>
      <div class="signin-error" id="signin-error"></div>
      <button class="signin-btn" id="signin-btn" onclick="signIn()" disabled>Sign In</button>
    </div>
  </div>

  <!-- ── ROLE SELECTION ── -->
  <div id="role-screen">
    <h1 id="role-screen-title">Homeschool Curriculum</h1>
    <p>Grades 4 – 10 &nbsp;|&nbsp; Math, English, Biology</p>
    <div class="role-buttons">
      <button class="role-btn" onclick="selectRole('parent')">
        <span class="icon">&#128218;</span>
        Parent
        <span class="subtitle">Full access to everything</span>
      </button>
      <button class="role-btn" onclick="selectRole('student')">
        <span class="icon">&#9997;&#65039;</span>
        Student
        <span class="subtitle">Pick your grade level</span>
      </button>
    </div>
  </div>

  <!-- ── STUDENT GRADE PICKER ── -->
  <div id="grade-picker">
    <h1>What grade are you in?</h1>
    <p>Pick your grade to see your curriculum</p>
    <div class="grade-grid">
      <button class="grade-btn" onclick="selectGrade(4)">4th<br><span class="label">Grade</span></button>
      <button class="grade-btn" onclick="selectGrade(5)">5th<br><span class="label">Grade</span></button>
      <button class="grade-btn" onclick="selectGrade(6)">6th<br><span class="label">Grade</span></button>
      <button class="grade-btn" onclick="selectGrade(7)">7th<br><span class="label">Grade</span></button>
      <button class="grade-btn" onclick="selectGrade(8)">8th<br><span class="label">Grade</span></button>
      <button class="grade-btn" onclick="selectGrade(9)">9th<br><span class="label">Grade</span></button>
      <button class="grade-btn" onclick="selectGrade(10)">10th<br><span class="label">Grade</span></button>
    </div>
    <button class="back-btn" onclick="goHome()" style="margin-top: 10px;">Back</button>
  </div>

  <!-- ── MAIN APP ── -->
  <div id="app-screen">
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:12px;">
        <button class="back-btn" onclick="goHome()">Home</button>
        <h2>Homeschool Curriculum</h2>
      </div>
      <div style="display:flex;align-items:center;gap:12px;">
        <span style="color:#94a3b8;font-size:0.85rem;" id="user-greeting"></span>
        <span class="role-badge" id="role-badge">PARENT</span>
        <button class="back-btn" onclick="signOut()">Sign Out</button>
      </div>
    </div>
    <div class="main-area">
      <div class="sidebar" id="sidebar"></div>
      <div class="content" id="content"></div>
    </div>
  </div>

  <script>
    let currentRole = null;
    let currentGrade = null;
    let userName = '';
    let userDob = '';

    // ── CHECK FOR UPDATES ON LAUNCH ──
    window.addEventListener('DOMContentLoaded', () => {
      window.api.checkForUpdate();

      // Enable sign-in button when both fields are filled
      const nameInput = document.getElementById('signin-name');
      const dobInput = document.getElementById('signin-dob');
      const btn = document.getElementById('signin-btn');

      function checkForm() {
        btn.disabled = !(nameInput.value.trim() && dobInput.value);
      }
      nameInput.addEventListener('input', checkForm);
      dobInput.addEventListener('input', checkForm);

      // Allow Enter key to sign in
      nameInput.addEventListener('keydown', (e) => { if (e.key === 'Enter' && !btn.disabled) signIn(); });
      dobInput.addEventListener('keydown', (e) => { if (e.key === 'Enter' && !btn.disabled) signIn(); });

      // Check if user already signed in before (saved in localStorage)
      const saved = localStorage.getItem('homeschool-user');
      if (saved) {
        const data = JSON.parse(saved);
        userName = data.name;
        userDob = data.dob;
        document.getElementById('signin-screen').style.display = 'none';
        document.getElementById('role-screen').style.display = 'flex';
        updateRoleScreenTitle();
      }
    });

    // ── SIGN IN ──
    function signIn() {
      const name = document.getElementById('signin-name').value.trim();
      const dob = document.getElementById('signin-dob').value;
      const error = document.getElementById('signin-error');

      if (!name) { error.textContent = 'Please enter your name.'; return; }
      if (!dob) { error.textContent = 'Please enter your date of birth.'; return; }

      userName = name;
      userDob = dob;
      localStorage.setItem('homeschool-user', JSON.stringify({ name, dob }));

      error.textContent = '';
      document.getElementById('signin-screen').style.display = 'none';
      document.getElementById('role-screen').style.display = 'flex';
      updateRoleScreenTitle();
    }

    // ── SIGN OUT ──
    function signOut() {
      localStorage.removeItem('homeschool-user');
      userName = '';
      userDob = '';
      currentRole = null;
      currentGrade = null;
      document.getElementById('app-screen').style.display = 'none';
      document.getElementById('grade-picker').style.display = 'none';
      document.getElementById('role-screen').style.display = 'none';
      document.getElementById('signin-screen').style.display = 'flex';
      document.getElementById('signin-name').value = '';
      document.getElementById('signin-dob').value = '';
      document.getElementById('signin-btn').disabled = true;
    }

    // ── ROLE SELECTION ──
    function selectRole(role) {
      currentRole = role;
      if (role === 'student') {
        document.getElementById('role-screen').style.display = 'none';
        document.getElementById('grade-picker').style.display = 'flex';
      } else {
        showApp();
      }
    }

    // Update role screen title with name whenever it's shown
    function updateRoleScreenTitle() {
      const title = document.getElementById('role-screen-title');
      if (userName) {
        title.textContent = `Welcome, ${userName}!`;
      } else {
        title.textContent = 'Homeschool Curriculum';
      }
    }

    function selectGrade(grade) {
      currentGrade = grade;
      document.getElementById('grade-picker').style.display = 'none';
      showApp();
    }

    function goHome() {
      currentRole = null;
      currentGrade = null;
      document.getElementById('app-screen').style.display = 'none';
      document.getElementById('grade-picker').style.display = 'none';
      document.getElementById('signin-screen').style.display = 'none';
      document.getElementById('role-screen').style.display = 'flex';
      updateRoleScreenTitle();
    }

    // ── SHOW APP ──
    function showApp() {
      document.getElementById('role-screen').style.display = 'none';
      document.getElementById('grade-picker').style.display = 'none';
      document.getElementById('app-screen').style.display = 'block';

      document.getElementById('user-greeting').textContent = userName ? `Hi, ${userName}` : '';

      const badge = document.getElementById('role-badge');
      if (currentRole === 'student') {
        badge.textContent = `STUDENT — GRADE ${currentGrade}`;
        badge.className = 'role-badge student';
      } else {
        badge.textContent = 'PARENT';
        badge.className = 'role-badge';
      }

      buildSidebar();
      showHomePage();
    }

    // ── SIDEBAR ──
    function buildSidebar() {
      const sidebar = document.getElementById('sidebar');
      sidebar.innerHTML = '';

      const addSection = (title, items) => {
        const section = document.createElement('div');
        section.className = 'sidebar-section';
        section.innerHTML = `<div class="sidebar-section-title">${title}</div>`;
        items.forEach(item => {
          const btn = document.createElement('button');
          btn.className = 'sidebar-item';
          btn.textContent = item.label;
          btn.onclick = () => {
            document.querySelectorAll('.sidebar-item').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            item.action();
          };
          section.appendChild(btn);
        });
        sidebar.appendChild(section);
      };

      // Home link
      addSection('Navigation', [{ label: 'Dashboard', action: showHomePage }]);

      if (currentRole === 'parent') {
        // Parents see everything
        const grades = [4, 5, 6, 7, 8, 9, 10];

        addSection('Curriculum Overview', grades.map(g => ({
          label: `Grade ${g}`,
          action: () => loadMarkdown(`curriculum/grade-${String(g).padStart(2, '0')}.md`)
        })));

        addSection('Yearly Plans (36 Weeks)', grades.map(g => ({
          label: `Grade ${g}`,
          action: () => loadMarkdown(`yearly-plans/grade-${String(g).padStart(2, '0')}.md`)
        })));

        addSection('Placement Tests', [
          { label: 'Math', action: () => loadMarkdown('placement-tests/math.md') },
          { label: 'English', action: () => loadMarkdown('placement-tests/english.md') },
          { label: 'Biology', action: () => loadMarkdown('placement-tests/biology.md') },
          { label: 'Scoring Guide', action: () => loadMarkdown('placement-tests/scoring-guide.md') }
        ]);

        addSection('Schedule', [
          { label: 'Weekly Schedule', action: () => loadMarkdown('schedule.md') }
        ]);

      } else {
        // Students see their grade only
        const g = currentGrade;
        const pad = String(g).padStart(2, '0');

        addSection('My Grade', [
          { label: 'Curriculum Overview', action: () => loadMarkdown(`curriculum/grade-${pad}.md`) },
          { label: 'Full Year Plan', action: () => loadMarkdown(`yearly-plans/grade-${pad}.md`) }
        ]);

        addSection('Placement Tests', [
          { label: 'Math', action: () => loadMarkdown('placement-tests/math.md') },
          { label: 'English', action: () => loadMarkdown('placement-tests/english.md') },
          { label: 'Biology', action: () => loadMarkdown('placement-tests/biology.md') }
        ]);

        addSection('Schedule', [
          { label: 'Weekly Schedule', action: () => loadMarkdown('schedule.md') }
        ]);
      }
    }

    // ── LOAD MARKDOWN ──
    async function loadMarkdown(filePath) {
      try {
        const md = await window.api.readFile(filePath);
        document.getElementById('content').innerHTML = window.api.parseMarkdown(md);
      } catch (e) {
        document.getElementById('content').innerHTML = `<h1>Error</h1><p>Could not load ${filePath}</p>`;
      }
    }

    // ── HOME / DASHBOARD ──
    function showHomePage() {
      document.querySelectorAll('.sidebar-item').forEach(b => b.classList.remove('active'));
      const firstItem = document.querySelector('.sidebar-item');
      if (firstItem) firstItem.classList.add('active');

      const content = document.getElementById('content');

      if (currentRole === 'parent') {
        content.innerHTML = `
          <h1>Parent Dashboard</h1>
          <p>Welcome${userName ? ', ' + userName : ''}! You have full access to the curriculum, yearly plans, placement tests, and scheduling for all grades (4–10).</p>
          <div class="home-cards">
            <div class="home-card" onclick="document.querySelectorAll('.sidebar-section')[1].querySelector('.sidebar-item').click()">
              <h3>Curriculum Overview</h3>
              <p>See what each grade covers in Math, English, and Biology.</p>
            </div>
            <div class="home-card" onclick="document.querySelectorAll('.sidebar-section')[2].querySelector('.sidebar-item').click()">
              <h3>Yearly Plans</h3>
              <p>36-week, quarter-by-quarter breakdown for every grade.</p>
            </div>
            <div class="home-card" onclick="document.querySelectorAll('.sidebar-section')[3].querySelector('.sidebar-item').click()">
              <h3>Placement Tests</h3>
              <p>Figure out what grade level to start each subject at.</p>
            </div>
            <div class="home-card" onclick="document.querySelectorAll('.sidebar-section')[4].querySelector('.sidebar-item').click()">
              <h3>Weekly Schedule</h3>
              <p>Suggested daily time blocks for each subject.</p>
            </div>
          </div>
          <h2 style="margin-top: 40px;">Getting Started</h2>
          <ol>
            <li><strong>Give the placement tests</strong> — have your student work through each subject's test until the questions get too hard.</li>
            <li><strong>Check the scoring guide</strong> — it tells you what grade level to start at based on results.</li>
            <li><strong>Open the yearly plan</strong> for the right grade and start at Week 1.</li>
            <li>It's totally normal to be at different grade levels for different subjects!</li>
          </ol>
        `;
      } else {
        const g = currentGrade;
        content.innerHTML = `
          <h1>Welcome${userName ? ', ' + userName : ''} — Grade ${g}!</h1>
          <p>Here's everything you need for your school year.</p>
          <div class="home-cards">
            <div class="home-card" onclick="document.querySelectorAll('.sidebar-section')[1].querySelector('.sidebar-item').click()">
              <h3>What You'll Learn</h3>
              <p>See all the topics you'll cover this year in Math, English, and Biology.</p>
            </div>
            <div class="home-card" onclick="document.querySelectorAll('.sidebar-section')[1].querySelectorAll('.sidebar-item')[1].click()">
              <h3>Full Year Plan</h3>
              <p>Your week-by-week schedule — see exactly what's coming up.</p>
            </div>
            <div class="home-card" onclick="document.querySelectorAll('.sidebar-section')[2].querySelector('.sidebar-item').click()">
              <h3>Placement Tests</h3>
              <p>Take a test to make sure you're starting at the right level.</p>
            </div>
            <div class="home-card" onclick="document.querySelectorAll('.sidebar-section')[3].querySelector('.sidebar-item').click()">
              <h3>Weekly Schedule</h3>
              <p>See how your school week is laid out.</p>
            </div>
          </div>
        `;
      }
    }
  </script>
